<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC"
      crossorigin="anonymous"
    />
    <title>Slot Machine</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body
    class="bg-dark text-white d-flex align-items-center justify-content-center vh-100"
  >
    <div class="text-center">
      <h2 class="mb-5">CREDIT: <span id="balance">100</span> RON</h2>
      <div class="d-flex justify-content-center gap-4 mb-5">
        <div
          class="reel-window bg-dark border border-secondary rounded shadow-lg"
        >
          <div class="win-line-fixed"></div>
          <div id="r1-strip" class="reel-strip">
            <div class="symbol opacity-50">💎</div>
            <div class="symbol">🍒</div>
            <div class="symbol opacity-50">7️⃣</div>
          </div>
        </div>
        <div
          class="reel-window bg-dark border border-secondary rounded shadow-lg"
        >
          <div class="win-line-fixed"></div>
          <div id="r2-strip" class="reel-strip">
            <div class="symbol opacity-50">🔔</div>
            <div class="symbol">🍋</div>
            <div class="symbol opacity-50">🍒</div>
          </div>
        </div>
        <div
          class="reel-window bg-dark border border-secondary rounded shadow-lg"
        >
          <div class="win-line-fixed"></div>
          <div id="r3-strip" class="reel-strip">
            <div class="symbol opacity-50">🍒</div>
            <div class="symbol">🔔</div>
            <div class="symbol opacity-50">💎</div>
          </div>
        </div>
      </div>
      <button
        id="spinBtn"
        class="btn btn-danger btn-lg px-5 fw-bold shadow"
        onclick="spin()"
      >
        SPIN (- 10 RON)
      </button>
      <div id="status" class="mt-4 fw-bold text-white fs-5">Play now!</div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
